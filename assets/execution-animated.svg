<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 170" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1080" height="170" rx="14" fill="#0b1422"/>
  <text x="540" y="30" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700" letter-spacing="3">EXECUTION · ACTS IN THE REAL WORLD — ONLY WITH YOUR YES</text>

  <line x1="120" y1="95" x2="960" y2="95" stroke="#122036" stroke-width="5"/>

  <!-- draft -->
  <g>
    <rect x="50" y="62" width="190" height="66" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <text x="145" y="89" text-anchor="middle" font-size="18">✉️</text>
    <text x="145" y="110" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">Draft prepared</text>
  </g>

  <!-- pulse stops at the gate -->
  <circle r="6" fill="#f87171">
    <animateMotion path="M 250 95 L 455 95" dur="6s" keyPoints="0;1;1" keyTimes="0;0.3;1" calcMode="linear" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- approval gate -->
  <g>
    <rect x="465" y="52" width="190" height="86" rx="11" fill="#14233a" stroke="#f87171" stroke-width="2"/>
    <text x="560" y="82" text-anchor="middle" font-size="18">🚧</text>
    <text x="560" y="103" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">Your approval</text>
    <text x="560" y="121" text-anchor="middle" fill="#7d93b2" font-size="10">"approve, edit, or cancel?"</text>
    <!-- the gate turns green when approved -->
    <rect x="465" y="52" width="190" height="86" rx="11" fill="none" stroke="#34d399" stroke-width="3" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.55;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="560" y="47" text-anchor="middle" font-size="15" opacity="0">👍
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.55;0.9;1" dur="6s" repeatCount="indefinite"/></text>
  </g>

  <!-- after approval the pulse continues green -->
  <circle r="6" fill="#34d399" opacity="0">
    <animateMotion path="M 655 95 L 880 95" dur="6s" keyPoints="0;0;1" keyTimes="0;0.55;0.75" calcMode="linear" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.6;0.75;0.8" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- send targets -->
  <g>
    <rect x="890" y="52" width="150" height="86" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <rect x="890" y="52" width="150" height="86" rx="11" fill="none" stroke="#34d399" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.78;0.95;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="965" y="80" text-anchor="middle" font-size="15">📧 📅 💬</text>
    <text x="965" y="103" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">Sent + logged</text>
    <text x="965" y="121" text-anchor="middle" fill="#7d93b2" font-size="10">Gmail · Calendar · Slack</text>
  </g>

  <text x="540" y="160" text-anchor="middle" fill="#7d93b2" font-size="11">500+ apps via Composio MCP · nothing ever sends without explicit approval · full audit trail</text>
</svg>
