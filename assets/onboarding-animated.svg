<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 170" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1080" height="170" rx="14" fill="#0b1422"/>
  <text x="540" y="30" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700" letter-spacing="3">ONBOARDING · HELLO → READY IN MINUTES</text>

  <line x1="110" y1="95" x2="970" y2="95" stroke="#122036" stroke-width="5"/>
  <line x1="110" y1="95" x2="970" y2="95" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6 10" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="32" to="0" dur="0.9s" repeatCount="indefinite"/>
  </line>
  <circle r="6" fill="#34d399">
    <animateMotion path="M 110 95 L 970 95" dur="6s" repeatCount="indefinite"/>
  </circle>

  <g>
    <rect x="40" y="62" width="160" height="66" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <rect x="40" y="62" width="160" height="66" rx="11" fill="none" stroke="#34d399" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.16;0.26" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="120" y="89" text-anchor="middle" font-size="18">👋</text>
    <text x="120" y="110" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">"What do you sell?"</text>
  </g>
  <g>
    <rect x="290" y="62" width="160" height="66" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <rect x="290" y="62" width="160" height="66" rx="11" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.26;0.4;0.5" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="89" text-anchor="middle" font-size="18">💰</text>
    <text x="370" y="110" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">Offers saved</text>
  </g>
  <g>
    <rect x="540" y="62" width="160" height="66" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <rect x="540" y="62" width="160" height="66" rx="11" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.5;0.64;0.74" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="620" y="89" text-anchor="middle" font-size="18">📄</text>
    <text x="620" y="110" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">Drop your Excel file</text>
  </g>
  <g>
    <rect x="790" y="62" width="250" height="66" rx="11" fill="#14233a" stroke="#122036" stroke-width="2"/>
    <rect x="790" y="62" width="250" height="66" rx="11" fill="none" stroke="#34d399" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.74;0.95;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="915" y="89" text-anchor="middle" font-size="18">✅</text>
    <text x="915" y="110" text-anchor="middle" fill="#dde8f5" font-size="12" font-weight="600">"240 leads ready — scan now?"</text>
  </g>

  <text x="540" y="152" text-anchor="middle" fill="#7d93b2" font-size="11">no setup screens · no formats to learn · one question at a time</text>
</svg>
